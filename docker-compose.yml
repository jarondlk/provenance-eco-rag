

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: onagawa_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: onagawa
      POSTGRES_PASSWORD: onagawa
      POSTGRES_DB: onagawa_rag
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
